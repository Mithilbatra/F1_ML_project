name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra vision
      - name: Run tests
        run: uv run python -m pytest -q
      - name: Frontend syntax check
        run: for f in web/*.js; do node --check "$f"; done
